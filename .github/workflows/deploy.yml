name: Deploy

# Deploys the connector to the server by running ./deploy.sh over SSH.
#
# Runs automatically on every push to main, and can be triggered manually from
# the Actions tab (workflow_dispatch). deploy.sh itself pulls origin/main,
# rebuilds, and restarts the PM2 process — this workflow just invokes it.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST         server hostname or IP
#   DEPLOY_USER         SSH user that owns the app dir (e.g. "deploy")
#   DEPLOY_SSH_KEY      private SSH key whose public half is in that user's
#                       ~/.ssh/authorized_keys
#   DEPLOY_KNOWN_HOSTS  output of `ssh-keyscan <DEPLOY_HOST>` (pins the host key
#                       so we don't blindly trust it on first connect)
# Optional:
#   DEPLOY_PORT         SSH port (defaults to 22)
#   DEPLOY_PATH         app dir on the server (defaults to /home/deploy/app)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run deploy.sh on the server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PORT: ${{ secrets.DEPLOY_PORT }}
          APP_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -p "${PORT:-22}" \
              "${USER}@${HOST}" \
              "cd ${APP_PATH:-/home/deploy/app} && ./deploy.sh"
